<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<div onClick="{{ mk.onClick }}" style="display: flex; flex-direction: column; gap: 14px; height: 100%; background: linear-gradient(180deg,rgba(124,255,107,.022),rgba(0,0,0,0)),#0a0f0c; border: 1px solid rgba(124,255,107,.1); border-radius: 16px; padding: 18px; cursor: pointer; transition: border-color .2s ease, box-shadow .2s ease, transform .2s ease;" style-hover="border-color:rgba(57,255,20,.3);box-shadow:0 0 0 1px rgba(57,255,20,.1),0 14px 40px rgba(0,0,0,.5),0 0 30px rgba(57,255,20,.1);transform:translateY(-2px);">

  <div style="display: flex; align-items: center; justify-content: space-between;">
    <span style="display: inline-flex; padding: 4px 11px; border-radius: 999px; font-size: 10px; font-weight: 700; letter-spacing: .08em; border: 1px solid; {{ mk.typeStyle }}">{{ mk.type }}</span>
    <span style="display: inline-flex; align-items: center; gap: 5px; font-size: 11px; color: {{ mk.lockColor }}; font-weight: 500;">{{ mk.lockLabel }}</span>
  </div>

  <div style="display: flex; align-items: center; gap: 12px;">
    <div style="width: 44px; height: 44px; border-radius: 12px; flex-shrink: 0; display: flex; align-items: center; justify-content: center; font-family: 'Orbitron', sans-serif; font-weight: 700; font-size: 14px; color: #7CFF6B; background: radial-gradient(circle at 30% 30%, rgba(57,255,20,.18), rgba(8,14,10,.9)); border: 1px solid rgba(57,255,20,.22);">{{ mk.kolInitials }}</div>
    <div style="flex: 1; min-width: 0;">
      <div style="font-weight: 600; font-size: 15px; line-height: 1.25; color: #E6EFE8;">{{ mk.question }}</div>
      <div style="font-size: 12px; color: #6E7C72; font-family: 'JetBrains Mono', monospace; margin-top: 2px;">{{ mk.kolHandle }}</div>
    </div>
  </div>

  <div style="display: flex; align-items: flex-end; justify-content: space-between;">
    <div>
      <div style="font-family: 'Orbitron', sans-serif; font-weight: 800; font-size: 30px; line-height: 1; color: #39FF14; text-shadow: 0 0 18px rgba(57,255,20,.35);">{{ mk.yesLabel }}</div>
      <div style="font-size: 10px; letter-spacing: .12em; text-transform: uppercase; color: #6E7C72; margin-top: 3px;">YES · {{ mk.multLabel }}</div>
    </div>
    <svg viewBox="0 0 88 26" width="88" height="26" preserveAspectRatio="none" style="overflow: visible;">
      <polyline points="{{ mk.spark }}" fill="none" stroke="{{ mk.sparkColor }}" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round" style="filter: drop-shadow(0 0 4px rgba(57,255,20,.5));"></polyline>
    </svg>
  </div>

  <div style="height: 8px; border-radius: 999px; overflow: hidden; display: flex; background: rgba(255,255,255,.05);">
    <div style="{{ mk.yesBarStyle }}; background: linear-gradient(90deg,#39FF14,#5CFF7A); box-shadow: 0 0 12px rgba(57,255,20,.45); transition: width .5s ease;"></div>
    <div style="{{ mk.noBarStyle }}; background: linear-gradient(90deg,#FF5E5E,#FF3B3B); transition: width .5s ease;"></div>
  </div>

  <div style="margin-top: auto; display: flex; align-items: center; justify-content: space-between; padding-top: 12px; border-top: 1px solid rgba(124,255,107,.07); font-size: 12px;">
    <span style="color: #84938A;">Vol <span style="color: #B7C2BA; font-weight: 600; font-family: 'JetBrains Mono', monospace;">{{ mk.volumeLabel }}</span></span>
    <span style="color: #84938A;"><span style="color: #B7C2BA; font-weight: 600; font-family: 'JetBrains Mono', monospace;">{{ mk.bettorsLabel }}</span> bettors</span>
  </div>
</div>
</x-dc>
<script type="text/x-dc" data-dc-script data-props="{&quot;$preview&quot;:{&quot;width&quot;:340,&quot;height&quot;:250},&quot;mk&quot;:{&quot;editor&quot;:null,&quot;tsType&quot;:&quot;any&quot;}}"></script>
</body>
</html>
